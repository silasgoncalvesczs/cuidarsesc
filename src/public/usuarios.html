<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuários - CUIDAR SESC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0fdf4;
        }
    </style>
</head>

<body class="text-gray-800">

    <nav class="bg-green-700 text-white p-4 shadow-md flex justify-between items-center">
        <a href="/index.html" class="text-white hover:text-green-200 font-bold text-xl">&larr; Voltar</a>
        <h1 class="text-2xl font-bold tracking-wide">Gerenciar Usuários</h1>
        <button onclick="logout()" class="text-white hover:text-red-200 font-bold">Sair</button>
    </nav>

    <main class="container mx-auto mt-8 p-4 max-w-4xl">

        <div class="bg-white rounded-2xl shadow-lg p-8 mb-8">
            <h2 class="text-xl font-bold text-gray-700 mb-6">Novo Usuário</h2>

            <form id="formNovoUsuario" onsubmit="criarUsuario(event)" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-gray-700 font-bold mb-1">Nome</label>
                    <input type="text" id="nome" required class="w-full px-3 py-2 rounded-lg border border-gray-300">
                </div>
                <div>
                    <label class="block text-gray-700 font-bold mb-1">E-mail</label>
                    <input type="email" id="email" required class="w-full px-3 py-2 rounded-lg border border-gray-300">
                </div>
                <div>
                    <label class="block text-gray-700 font-bold mb-1">Senha</label>
                    <input type="password" id="senha" required minlength="6"
                        class="w-full px-3 py-2 rounded-lg border border-gray-300">
                </div>
                <div>
                    <label class="block text-gray-700 font-bold mb-1">Perfil</label>
                    <select id="perfil" required class="w-full px-3 py-2 rounded-lg border border-gray-300">
                        <option value="operador">Operador (totem)</option>
                        <option value="gestor">Gestor</option>
                        <option value="admin">Admin</option>
                    </select>
                </div>
                <div id="mensagem" class="hidden md:col-span-2 p-3 rounded-lg text-sm"></div>
                <div class="md:col-span-2">
                    <button type="submit"
                        class="bg-green-600 hover:bg-green-700 text-white font-bold py-2 px-6 rounded-lg">
                        Criar Usuário
                    </button>
                </div>
            </form>
        </div>

        <div class="bg-white rounded-2xl shadow-lg p-8">
            <h2 class="text-xl font-bold text-gray-700 mb-4">Usuários Cadastrados</h2>
            <table class="w-full text-left">
                <thead>
                    <tr class="border-b">
                        <th class="pb-2">Nome</th>
                        <th class="pb-2">E-mail</th>
                        <th class="pb-2">Perfil</th>
                    </tr>
                </thead>
                <tbody id="listaUsuarios"></tbody>
            </table>
        </div>

    </main>

    <script src="/js/auth.js"></script>
    <script>
        // O ideal é ter a função exigindo perfil, garantindo que auth.js lidou com ela
        if (typeof exigirPerfil === 'function') {
            exigirPerfil(['admin']);
        }

        async function carregarUsuarios() {
            try {
                const response = await fetchAutenticado('/api/usuarios');
                const usuarios = await response.json();
                const tbody = document.getElementById('listaUsuarios');
                tbody.innerHTML = '';

                if (Array.isArray(usuarios)) {
                    usuarios.forEach(u => {
                        const tr = document.createElement('tr');
                        tr.className = 'border-b';
                        tr.innerHTML = `
                            <td class="py-2">${u.nome}</td>
                            <td class="py-2">${u.email}</td>
                            <td class="py-2 capitalize">${u.perfil}</td>
                        `;
                        tbody.appendChild(tr);
                    });
                }
            } catch (error) {
                console.error('Erro ao carregar lista de usuários:', error);
            }
        }

        async function criarUsuario(event) {
            event.preventDefault();
            const mensagem = document.getElementById('mensagem');
            mensagem.classList.add('hidden');

            const dados = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                senha: document.getElementById('senha').value,
                perfil: document.getElementById('perfil').value
            };

            try {
                const response = await fetchAutenticado('/api/usuarios', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dados)
                });

                const resultado = await response.json();

                if (response.ok) {
                    mensagem.className = 'md:col-span-2 p-3 rounded-lg text-sm bg-green-50 text-green-700';
                    mensagem.innerText = 'Usuário criado com sucesso!';
                    document.getElementById('formNovoUsuario').reset();
                    carregarUsuarios(); // Recarrega a tabela para mostrar o novo
                } else {
                    mensagem.className = 'md:col-span-2 p-3 rounded-lg text-sm bg-red-50 text-red-700';
                    mensagem.innerText = resultado.erro || 'Erro ao criar usuário.';
                }
                mensagem.classList.remove('hidden');
            } catch (err) {
                // Aqui era onde o código original estava cortado
                mensagem.className = 'md:col-span-2 p-3 rounded-lg text-sm bg-red-50 text-red-700';
                mensagem.innerText = 'Erro de conexão com o servidor ao tentar criar usuário.';
                mensagem.classList.remove('hidden');
                console.error(err);
            }
        }

        // Adiciona um evento para carregar a lista de usuários assim que a página abrir
        document.addEventListener('DOMContentLoaded', carregarUsuarios);
    </script>
</body>

</html>
