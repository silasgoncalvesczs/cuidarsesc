<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Usuários - CUIDAR SESC</title>
    <link rel="stylesheet" href="/css/app.css">
    <script src="/js/tema.js"></script>
</head>
<body>
    <div class="app-shell">
        <header class="topbar">
            <a class="topbar-link" href="/index.html">
                <span class="icon-mask icon" style="mask-image:url('/icons/arrow-left.svg');-webkit-mask-image:url('/icons/arrow-left.svg')"></span>
                Voltar
            </a>
            <h1>Usuários do Sistema</h1>
            <div class="topbar-actions">
                <button type="button" class="topbar-btn" id="btnTemaTopbar" onclick="alternarTema()">
                    <span class="icon-mask icon" id="iconTemaTopbar" style="mask-image:url('/icons/moon.svg');-webkit-mask-image:url('/icons/moon.svg')"></span>
                    <span id="labelTemaTopbar">Escuro</span>
                </button>
                <a class="topbar-btn" href="/conta.html">
                    <span class="icon-mask icon" style="mask-image:url('/icons/settings.svg');-webkit-mask-image:url('/icons/settings.svg')"></span>
                    Conta
                </a>
                <button type="button" class="topbar-btn" onclick="logout()">
                    <span class="icon-mask icon" style="mask-image:url('/icons/logout.svg');-webkit-mask-image:url('/icons/logout.svg')"></span>
                    Sair
                </button>
            </div>
        </header>

        <main class="page">
            <section class="panel mb-2">
                <div class="actions" style="margin-top:0;align-items:center">
                    <h2 class="section-title" style="margin:0" id="tituloFormulario">Novo usuário</h2>
                    <button type="button" id="btnCancelarEdicao" class="btn btn-ghost hidden" onclick="cancelarEdicao()">Cancelar edição</button>
                </div>

                <form id="formUsuario" onsubmit="salvarUsuario(event)" class="form-grid two">
                    <div class="field">
                        <label for="nome">Nome</label>
                        <input type="text" id="nome" required>
                    </div>
                    <div class="field">
                        <label for="email">E-mail</label>
                        <input type="email" id="email" required>
                    </div>
                    <div class="field">
                        <label for="senha" id="labelSenha">Senha</label>
                        <input type="password" id="senha" minlength="6" required>
                        <small id="ajudaSenha" class="hidden" style="color:var(--muted)">Deixe em branco para manter a senha atual.</small>
                    </div>
                    <div class="field">
                        <label for="perfil">Perfil</label>
                        <select id="perfil" required>
                            <option value="operador">Operador (totem)</option>
                            <option value="gestor">Gestor</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    <div id="mensagem" class="banner hidden full"></div>
                    <div class="full">
                        <button type="submit" class="btn btn-primary" id="btnSalvar">Criar usuário</button>
                    </div>
                </form>
            </section>

            <section class="panel">
                <h2 class="section-title">Usuários cadastrados</h2>
                <div class="table-wrap">
                    <table class="data">
                        <thead>
                            <tr>
                                <th>Nome</th>
                                <th>E-mail</th>
                                <th>Perfil</th>
                                <th>Status</th>
                                <th>Ações</th>
                            </tr>
                        </thead>
                        <tbody id="listaUsuarios">
                            <tr><td colspan="5" class="center">Carregando...</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        if (typeof exigirPerfil === 'function') {
            exigirPerfil(['admin']);
        }

        const formUsuario = document.getElementById('formUsuario');
        const campoSenha = document.getElementById('senha');
        const labelSenha = document.getElementById('labelSenha');
        const ajudaSenha = document.getElementById('ajudaSenha');
        const btnSalvar = document.getElementById('btnSalvar');
        const btnCancelarEdicao = document.getElementById('btnCancelarEdicao');
        const tituloFormulario = document.getElementById('tituloFormulario');
        const mensagem = document.getElementById('mensagem');

        let idEditando = null;
        const usuarioLogado = getUsuarioLogado();

        function escapeHtml(texto) {
            return String(texto || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;');
        }

        function mostrarMensagem(tipo, texto) {
            mensagem.className = 'banner full ' + (tipo === 'ok' ? 'banner-ok' : 'banner-danger');
            mensagem.innerText = texto;
            mensagem.classList.remove('hidden');
        }

        function editarUsuario(u) {
            idEditando = u._id;
            tituloFormulario.innerText = u.protegido ? 'Editar admin do sistema' : 'Editar usuário';
            btnSalvar.innerText = 'Salvar alterações';
            document.getElementById('nome').value = u.nome || '';
            document.getElementById('email').value = u.email || '';
            document.getElementById('perfil').value = u.perfil || 'operador';
            document.getElementById('email').disabled = Boolean(u.protegido);
            document.getElementById('perfil').disabled = Boolean(u.protegido);
            campoSenha.value = '';
            campoSenha.required = false;
            labelSenha.innerText = 'Nova senha (opcional)';
            ajudaSenha.classList.remove('hidden');
            btnCancelarEdicao.classList.remove('hidden');
            mensagem.classList.add('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function modoCriacao() {
            idEditando = null;
            formUsuario.reset();
            tituloFormulario.innerText = 'Novo usuário';
            btnSalvar.innerText = 'Criar usuário';
            labelSenha.innerText = 'Senha';
            campoSenha.required = true;
            ajudaSenha.classList.add('hidden');
            btnCancelarEdicao.classList.add('hidden');
            document.getElementById('email').disabled = false;
            document.getElementById('perfil').disabled = false;
            mensagem.classList.add('hidden');
        }

        function cancelarEdicao() {
            modoCriacao();
        }

        async function carregarUsuarios() {
            const tbody = document.getElementById('listaUsuarios');
            tbody.innerHTML = '<tr><td colspan="5" class="center">Carregando...</td></tr>';

            try {
                const response = await fetchAutenticado('/api/usuarios');
                const usuarios = await response.json();
                tbody.innerHTML = '';

                if (!Array.isArray(usuarios) || usuarios.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="center">Nenhum usuário cadastrado.</td></tr>';
                    return;
                }

                usuarios.forEach((u) => {
                    const tr = document.createElement('tr');
                    if (!u.ativo) tr.className = 'row-inactive';
                    const souEu = usuarioLogado && String(usuarioLogado._id) === String(u._id);
                    const statusHtml = u.ativo
                        ? '<span class="badge badge-ok">Ativo</span>'
                        : '<span class="badge badge-off">Inativo</span>';
                    const statusLabel = u.ativo ? 'Inativar' : 'Ativar';
                    const badgeSistema = u.protegido
                        ? ' <span class="badge badge-ok" title="Admin protegido do .env">Sistema</span>'
                        : '';

                    let acoes = '<button type="button" class="btn btn-secondary btn-sm" data-acao="editar">Editar</button>';
                    if (!u.protegido) {
                        acoes +=
                            '<button type="button" class="btn btn-ghost btn-sm" data-acao="status">' + statusLabel + '</button>' +
                            '<button type="button" class="btn btn-danger-outline btn-sm" data-acao="excluir">Excluir</button>';
                    }

                    tr.innerHTML =
                        '<td>' + escapeHtml(u.nome) + (souEu ? ' <small>(você)</small>' : '') + badgeSistema + '</td>' +
                        '<td>' + escapeHtml(u.email) + '</td>' +
                        '<td style="text-transform:capitalize">' + escapeHtml(u.perfil) + '</td>' +
                        '<td>' + statusHtml + '</td>' +
                        '<td><div class="actions-cell">' + acoes + '</div></td>';

                    tr.querySelector('[data-acao="editar"]').addEventListener('click', () => editarUsuario(u));
                    const btnStatus = tr.querySelector('[data-acao="status"]');
                    const btnExcluir = tr.querySelector('[data-acao="excluir"]');
                    if (btnStatus) btnStatus.addEventListener('click', () => alternarStatus(u));
                    if (btnExcluir) btnExcluir.addEventListener('click', () => excluirUsuario(u));
                    tbody.appendChild(tr);
                });
            } catch (error) {
                console.error(error);
                tbody.innerHTML = '<tr><td colspan="5" class="center">Erro ao carregar usuários.</td></tr>';
            }
        }

        async function alternarStatus(u) {
            if (u.protegido) {
                alert('Este é o administrador do sistema e não pode ser inativado.');
                return;
            }
            const novoAtivo = !u.ativo;
            const acao = novoAtivo ? 'ativar' : 'inativar';
            if (!confirm('Deseja ' + acao + ' o usuário "' + u.nome + '"?')) return;

            try {
                const response = await fetchAutenticado('/api/usuarios/' + u._id + '/status', {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ ativo: novoAtivo })
                });
                const resultado = await response.json();
                if (!response.ok) {
                    alert(resultado.erro || 'Não foi possível atualizar o status.');
                    return;
                }
                carregarUsuarios();
            } catch (err) {
                console.error(err);
                alert('Erro de conexão ao atualizar status.');
            }
        }

        async function excluirUsuario(u) {
            if (u.protegido) {
                alert('Este é o administrador do sistema e não pode ser excluído.');
                return;
            }
            if (!confirm('Excluir permanentemente "' + u.nome + '"?\n\nEsta ação não pode ser desfeita.')) return;
            if (!confirm('Confirma a exclusão de "' + u.nome + '"?')) return;

            try {
                const response = await fetchAutenticado('/api/usuarios/' + u._id, { method: 'DELETE' });
                const resultado = await response.json();
                if (!response.ok) {
                    alert(resultado.erro || 'Não foi possível excluir.');
                    return;
                }
                if (idEditando && String(idEditando) === String(u._id)) {
                    modoCriacao();
                }
                carregarUsuarios();
            } catch (err) {
                console.error(err);
                alert('Erro de conexão ao excluir.');
            }
        }

        async function salvarUsuario(event) {
            event.preventDefault();
            mensagem.classList.add('hidden');

            const dados = {
                nome: document.getElementById('nome').value.trim(),
                email: document.getElementById('email').value.trim(),
                perfil: document.getElementById('perfil').value
            };
            const senha = campoSenha.value;
            if (senha) dados.senha = senha;

            try {
                let response;
                if (idEditando) {
                    response = await fetchAutenticado('/api/usuarios/' + idEditando, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(dados)
                    });
                } else {
                    if (!senha) {
                        mostrarMensagem('erro', 'A senha é obrigatória para novos usuários.');
                        return;
                    }
                    dados.senha = senha;
                    response = await fetchAutenticado('/api/usuarios', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(dados)
                    });
                }

                const resultado = await response.json();
                if (response.ok) {
                    const textoOk = idEditando ? 'Usuário atualizado com sucesso!' : 'Usuário criado com sucesso!';
                    modoCriacao();
                    mostrarMensagem('ok', textoOk);
                    carregarUsuarios();
                } else {
                    mostrarMensagem('erro', resultado.erro || 'Erro ao salvar usuário.');
                }
            } catch (err) {
                console.error(err);
                mostrarMensagem('erro', 'Erro de conexão com o servidor.');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            modoCriacao();
            carregarUsuarios();
        });
    </script>
</body>
</html>
