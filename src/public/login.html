<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CUIDAR SESC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0fdf4;
        }
    </style>
</head>

<body class="min-h-screen flex items-center justify-center">

    <div class="bg-white rounded-2xl shadow-xl p-10 w-full max-w-md">
        <h1 class="text-3xl font-bold text-green-800 text-center mb-8">CUIDAR SESC</h1>

        <form id="formLogin" onsubmit="fazerLogin(event)">
            <div class="mb-4">
                <label class="block text-gray-700 font-bold mb-2">E-mail</label>
                <input type="email" id="email" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>

            <div class="mb-6">
                <label class="block text-gray-700 font-bold mb-2">Senha</label>
                <input type="password" id="senha" required
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:outline-none focus:ring-2 focus:ring-green-500">
            </div>

            <div id="mensagemErro" class="hidden bg-red-50 text-red-700 text-sm p-3 rounded-lg mb-4"></div>

            <button type="submit"
                class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg text-lg transition">
                Entrar
            </button>
        </form>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        // Se já estiver logado, manda direto pro início
        if (getToken()) {
            window.location.href = '/index.html';
        }

        async function fazerLogin(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const mensagemErro = document.getElementById('mensagemErro');
            mensagemErro.classList.add('hidden');

            try {
                const response = await fetch('/api/usuarios/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });

                const resultado = await response.json();

                if (response.ok) {
                    salvarSessao(resultado.token, resultado.usuario);
                    window.location.href = '/index.html';
                } else {
                    mensagemErro.innerText = resultado.erro || 'Erro ao fazer login.';
                    mensagemErro.classList.remove('hidden');
                }
            } catch (err) {
                mensagemErro.innerText = 'Erro de conexão com o servidor.';
                mensagemErro.classList.remove('hidden');
            }
        }
    </script>
</body>

</html>
