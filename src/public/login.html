<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - CUIDAR SESC</title>
    <link rel="stylesheet" href="/css/app.css">
    <script src="/js/tema.js"></script>
</head>
<body>
    <div class="login-wrap">
        <div class="login-card">
            <div style="display:flex;justify-content:center;margin-bottom:0.75rem;color:var(--brand)">
                <span class="icon-mask icon-xl" style="mask-image:url('/icons/shield.svg');-webkit-mask-image:url('/icons/shield.svg')"></span>
            </div>
            <h1 class="brand">CUIDAR SESC</h1>
            <p class="subtitle">Acesso ao sistema de gestão e presença</p>

            <form id="formLogin" onsubmit="fazerLogin(event)">
                <div class="field mb-2">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" required autocomplete="username">
                </div>
                <div class="field mb-2">
                    <label for="senha">Senha</label>
                    <input type="password" id="senha" required autocomplete="current-password">
                </div>

                <div id="mensagemErro" class="banner banner-danger hidden mb-2"></div>

                <button type="submit" class="btn btn-primary btn-lg">Entrar no sistema</button>
            </form>
        </div>
    </div>

    <script src="/js/auth.js"></script>
    <script>
        if (getToken()) {
            window.location.href = '/index.html';
        }

        async function fazerLogin(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const senha = document.getElementById('senha').value;
            const mensagemErro = document.getElementById('mensagemErro');
            mensagemErro.classList.add('hidden');

            try {
                const response = await fetch('/api/usuarios/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, senha })
                });
                const resultado = await response.json();

                if (response.ok) {
                    salvarSessao(resultado.token, resultado.usuario);
                    window.location.href = '/index.html';
                } else {
                    mensagemErro.innerText = resultado.erro || 'Erro ao fazer login.';
                    mensagemErro.classList.remove('hidden');
                }
            } catch (err) {
                mensagemErro.innerText = 'Erro de conexão com o servidor.';
                mensagemErro.classList.remove('hidden');
            }
        }
    </script>
</body>
</html>
