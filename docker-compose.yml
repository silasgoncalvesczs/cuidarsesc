version: "3.9"

services:
  mongodb:
    image: mongo:latest
    container_name: cuidar_sesc_mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cuidar_sesc_app
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - MONGO_URI=mongodb://mongodb:27017/cuidar_sesc
    env_file:
      - .env
    volumes:
      - ./src:/app/src
      - ./uploads:/app/uploads
    depends_on:
      - mongodb
    restart: unless-stopped

# O SEGREDO ESTÁ AQUI: Criamos a declaração do volume gerenciado global
volumes:
  mongo_data:
